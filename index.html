<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>沖繩8天7夜 2026 | 小寶軒軒姐緁翎偉哥阿如</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ocean-blue: #0077BE;
            --sky-blue: #87CEEB;
            --coral: #FF6B6B;
            --sand: #F4E4C1;
            --palm-green: #2D5016;
            --sunset-orange: #FF8C42;
            --tropical-teal: #00BFA5;
            --deep-ocean: #004E7C;
            --white: #FFFFFF;
            --light-bg: #FFF9F0;
            --shadow: rgba(0, 119, 190, 0.15);
        }

        body {
            font-family: 'Noto Sans TC', 'Quicksand', sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--light-bg) 40%);
            min-height: 100vh;
            padding-bottom: 80px;
            position: relative;
            overflow-x: hidden;
        }

        /* 波浪裝飾 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120"><path d="M0,64L48,69.3C96,75,192,85,288,80C384,75,480,53,576,48C672,43,768,53,864,64C960,75,1056,85,1152,80L1200,75L1200,0L1152,0C1056,0,960,0,864,0C768,0,672,0,576,0C480,0,384,0,288,0C192,0,96,0,48,0L0,0Z" fill="%2387CEEB" fill-opacity="0.3"/></svg>') repeat-x;
            background-size: 1200px 120px;
            animation: wave 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes wave {
            0% { background-position: 0 0; }
            100% { background-position: 1200px 0; }
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--ocean-blue), var(--tropical-teal));
            color: white;
            padding: 25px 20px 30px;
            text-align: center;
            box-shadow: 0 4px 20px var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .header-title {
            font-family: 'Pacifico', cursive;
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header-subtitle {
            font-size: 14px;
            opacity: 0.95;
            font-weight: 400;
        }

        .header-members {
            margin-top: 12px;
            font-size: 13px;
            opacity: 0.9;
            font-weight: 500;
        }

        /* Page Title Indicator */
        .page-title-indicator {
            background: linear-gradient(135deg, rgba(255,107,107,0.95), rgba(255,140,66,0.95));
            color: white;
            padding: 15px 20px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 2px 10px rgba(255,107,107,0.3);
            margin: 20px 20px 10px;
            border-radius: 15px;
            position: relative;
            z-index: 10;
        }

        /* Container */
        .container {
            max-width: 100%;
            padding: 0 20px 20px;
            position: relative;
            z-index: 1;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding: 15px 10px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            background: linear-gradient(to right, rgba(255,255,255,0.95), rgba(255,255,255,0.95));
            border-radius: 15px;
            box-shadow: 0 2px 10px var(--shadow);
        }

        .tab-nav::-webkit-scrollbar {
            display: none;
        }

        .tab-button {
            background: white;
            border: 2px solid var(--ocean-blue);
            color: var(--ocean-blue);
            padding: 14px 24px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            flex-shrink: 0;
            box-shadow: 0 2px 8px var(--shadow);
            position: relative;
        }

        .tab-button.active {
            background: linear-gradient(135deg, var(--ocean-blue), var(--tropical-teal));
            color: white;
            border-color: var(--tropical-teal);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 119, 190, 0.4);
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Day Cards */
        .day-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px var(--shadow);
            border-left: 5px solid var(--coral);
        }

        .day-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--sand);
        }

        .day-number {
            background: linear-gradient(135deg, var(--coral), var(--sunset-orange));
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 18px;
            margin-right: 15px;
            box-shadow: 0 3px 10px rgba(255, 107, 107, 0.3);
        }

        .day-title {
            flex: 1;
        }

        .day-date {
            font-size: 16px;
            font-weight: 700;
            color: var(--deep-ocean);
            margin-bottom: 4px;
        }

        .day-theme {
            font-size: 13px;
            color: var(--ocean-blue);
            font-weight: 500;
        }

        /* Activity Items */
        .activity {
            margin-bottom: 18px;
            padding-left: 15px;
            border-left: 3px solid var(--sky-blue);
        }

        .activity-time {
            font-size: 13px;
            color: var(--ocean-blue);
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .activity-time::before {
            content: '🕐';
            font-size: 16px;
        }

        .activity-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--deep-ocean);
            margin-bottom: 6px;
        }

        .activity-desc {
            font-size: 13px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .activity-cost {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #FFF3E0, #FFE0B2);
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            color: #E65100;
            margin-top: 6px;
        }

        /* Map Button */
        .map-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--tropical-teal), var(--ocean-blue));
            color: white;
            padding: 10px 18px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
            box-shadow: 0 3px 10px rgba(0, 191, 165, 0.3);
            transition: all 0.3s ease;
        }

        .map-button::before {
            content: '📍';
            font-size: 16px;
        }

        /* Budget Summary */
        .budget-summary {
            background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.15);
        }

        .budget-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--palm-green);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .budget-title::before {
            content: '💰';
            font-size: 24px;
        }

        .budget-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(46, 125, 50, 0.1);
            font-size: 14px;
        }

        .budget-row:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 16px;
            color: var(--palm-green);
            padding-top: 15px;
            margin-top: 5px;
            border-top: 2px solid var(--palm-green);
        }

        /* Checklist */
        .checklist {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .checklist-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--deep-ocean);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--sand);
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--ocean-blue);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
            position: relative;
            transition: all 0.3s ease;
        }

        .checkbox.checked {
            background: linear-gradient(135deg, var(--ocean-blue), var(--tropical-teal));
            border-color: var(--tropical-teal);
        }

        .checkbox.checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 16px;
            font-weight: 900;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .checklist-text {
            flex: 1;
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        .checklist-text.checked {
            color: #999;
            text-decoration: line-through;
        }

        /* Info Cards */
        .info-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .info-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--deep-ocean);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-section {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--sand);
        }

        .info-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-label {
            font-size: 13px;
            color: var(--ocean-blue);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .info-value {
            font-size: 14px;
            color: #333;
            line-height: 1.6;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0 max(10px, env(safe-area-inset-bottom));
            box-shadow: 0 -3px 15px var(--shadow);
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
            flex: 1;
            max-width: 80px;
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(0, 119, 190, 0.1), rgba(0, 191, 165, 0.1));
        }

        .nav-icon {
            font-size: 24px;
            filter: grayscale(100%);
            transition: all 0.3s ease;
        }

        .nav-item.active .nav-icon {
            filter: grayscale(0%);
            transform: scale(1.1);
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s ease;
        }

        .nav-item.active .nav-label {
            color: var(--ocean-blue);
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--sand), transparent);
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">🌴 沖繩 2026 🌺</div>
        <div class="header-subtitle">8天7夜親子自由行 | 6/20-6/27</div>
        <div class="header-members">小寶軒軒一家 · 姐一家 · 緁翎一家 · 偉哥 · 阿如</div>
    </header>

    <div class="page-title-indicator" id="pageTitle">📅 每日行程</div>

    <div class="container" id="mainContainer">
        <!-- 行程頁面會動態載入這裡 -->
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item active" data-page="itinerary">
            <div class="nav-icon">🗓️</div>
            <div class="nav-label">行程</div>
        </div>
        <div class="nav-item" data-page="budget">
            <div class="nav-icon">💰</div>
            <div class="nav-label">預算</div>
        </div>
        <div class="nav-item" data-page="checklist">
            <div class="nav-icon">✅</div>
            <div class="nav-label">清單</div>
        </div>
        <div class="nav-item" data-page="tips">
            <div class="nav-icon">⚠️</div>
            <div class="nav-label">注意</div>
        </div>
        <div class="nav-item" data-page="info">
            <div class="nav-icon">ℹ️</div>
            <div class="nav-label">資訊</div>
        </div>
    </div>

    <script>
        // 底部導航切換
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const page = item.dataset.page;
                
                // 移除所有active
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                
                // 顯示對應頁面
                showPage(page);
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        function showPage(page) {
            const container = document.getElementById('mainContainer');
            const pageTitle = document.getElementById('pageTitle');
            
            switch(page) {
                case 'itinerary':
                    pageTitle.textContent = '📅 每日行程';
                    pageTitle.style.background = 'linear-gradient(135deg, rgba(255,107,107,0.95), rgba(255,140,66,0.95))';
                    showItinerary();
                    break;
                case 'budget':
                    pageTitle.textContent = '💰 預算統計';
                    pageTitle.style.background = 'linear-gradient(135deg, rgba(46,125,50,0.95), rgba(76,175,80,0.95))';
                    showBudget();
                    break;
                case 'checklist':
                    pageTitle.textContent = '✅ 準備清單';
                    pageTitle.style.background = 'linear-gradient(135deg, rgba(0,119,190,0.95), rgba(0,191,165,0.95))';
                    showChecklist();
                    break;
                case 'tips':
                    pageTitle.textContent = '⚠️ 重要注意事項';
                    pageTitle.style.background = 'linear-gradient(135deg, rgba(255,152,0,0.95), rgba(255,193,7,0.95))';
                    showTips();
                    break;
                case 'info':
                    pageTitle.textContent = 'ℹ️ 實用資訊';
                    pageTitle.style.background = 'linear-gradient(135deg, rgba(63,81,181,0.95), rgba(103,58,183,0.95))';
                    showInfo();
                    break;
            }
        }

        function showItinerary() {
            const container = document.getElementById('mainContainer');
            container.innerHTML = `
                <div class="tab-nav" id="tabNav">
                    <button class="tab-button active" onclick="showDay(1, this)">Day 1</button>
                    <button class="tab-button" onclick="showDay(2, this)">Day 2</button>
                    <button class="tab-button" onclick="showDay(3, this)">Day 3</button>
                    <button class="tab-button" onclick="showDay(4, this)">Day 4</button>
                    <button class="tab-button" onclick="showDay(5, this)">Day 5</button>
                    <button class="tab-button" onclick="showDay(6, this)">Day 6</button>
                    <button class="tab-button" onclick="showDay(7, this)">Day 7</button>
                    <button class="tab-button" onclick="showDay(8, this)">Day 8</button>
                </div>
                <div id="dayContent"></div>
            `;
            showDay(1);
        }

        function showDay(dayNum, button) {
            if (button) {
                document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                button.classList.add('active');
            }
            
            const content = document.getElementById('dayContent');
            content.innerHTML = getDayContent(dayNum);
        }

                        </div>
