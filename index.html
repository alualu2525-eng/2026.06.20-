function renderDay(n){
  const d=DAYS[n];
  let acts=d.acts.map(a=>`
    <div class="act">
      <div class="act-time">${a.t}</div>
      <div class="act-title">${a.title}</div>
      ${a.desc?`<div class="act-desc">${a.desc}</div>`:''}
      ${a.cost?`<div class="act-cost">💴 ${a.cost}</div>`:''}
      ${a.map?`<a href="${a.map}" class="map-btn" target="_blank">Google 導航</a>`:''}
    </div>`).join('');
  let brows=d.budget.map((r,i)=>`<div class="budget-row"><span>${r[0]}</span><span>${r[1]}</span></div>`).join('');
  return `<div class="day-card">
    <div class="day-hd">
      <div class="day-num">${n}</div>
      <div><div class="day-date">${d.date}</div><div class="day-theme">${d.theme}</div></div>
    </div>
    ${acts}
    <div class="divider"></div>
    <div class="budget-box"><div class="budget-title">當日預算</div>${brows}</div>
  </div>`;
}

function showItinerary(){
  const c=document.getElementById('mainContainer');
  c.innerHTML=`<div class="tab-nav" id="tabNav">${[1,2,3,4,5,6,7,8].map(n=>`<button class="tab-btn${n===1?' active':''}" onclick="switchDay(${n},this)">Day ${n}</button>`).join('')}</div><div id="dayContent">${renderDay(1)}</div>`;
}

function switchDay(n,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('dayContent').innerHTML=renderDay(n);
  window.scrollTo({top:80,behavior:'smooth'});
}

      <div class="info-title">💡 實用日文</div>
      <div class="info-sec"><div class="info-label">基本</div>
      <div class="info-val">
        你好：こんにちは<br>
        謝謝：ありがとうございます<br>
        不好意思：すみません
      </div></div>
      <div class="info-sec"><div class="info-label">餐廳</div>
      <div class="info-val">
        菜單：メニュー<br>
        多少錢：いくらですか<br>
        買單：お会計<br>
        不吃牛：牛肉は食べられません
      </div></div>
      <div class="info-sec"><div class="info-label">問路</div>
      <div class="info-val">
        廁所在哪：トイレはどこですか<br>
        停車場：駐車場
      </div></div>
    </div>`;
}

function toggleCheck(cb){
  cb.classList.toggle('checked');
  cb.nextElementSibling.classList.toggle('checked');
}

// 底部導航
document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click',()=>{
    const page=item.dataset.page;
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    item.classList.add('active');
    const bar=document.getElementById('pageBar');
    const configs={
      itinerary:{text:'📅 每日行程',bg:'linear-gradient(135deg,rgba(255,107,107,.9),rgba(255,140,66,.9))'},
      budget:{text:'💰 預算統計',bg:'linear-gradient(135deg,rgba(46,125,50,.9),rgba(76,175,80,.9))'},
      checklist:{text:'✅ 準備清單',bg:'linear-gradient(135deg,rgba(0,119,190,.9),rgba(0,191,165,.9))'},
      tips:{text:'⚠️ 重要注意事項',bg:'linear-gradient(135deg,rgba(255,152,0,.9),rgba(255,193,7,.9))'},
      info:{text:'ℹ️ 實用資訊',bg:'linear-gradient(135deg,rgba(63,81,181,.9),rgba(103,58,183,.9))'},
    };
    const cfg=configs[page];
    bar.textContent=cfg.text;
    bar.style.background=cfg.bg;
    if(page==='itinerary') showItinerary();
    else if(page==='budget') showBudget();
    else if(page==='checklist') showChecklist();
    else if(page==='tips') showTips();
    else if(page==='info') showInfo();
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

// 初始化
showItinerary();
</script>
</body>
</html>
